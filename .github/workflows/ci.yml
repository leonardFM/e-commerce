name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: solutech_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run prisma:generate

      - name: Setup test database
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/solutech_test?schema=public

      - run: npm run lint

      - run: npm run test:integration
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/solutech_test?schema=public
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-that-is-at-least-32-characters-long-for-ci' }}

      - run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-that-is-at-least-32-characters-long-for-ci' }}
